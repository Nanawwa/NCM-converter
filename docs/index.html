<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCM Converter</title>
    <style>
        :root {
            --bg: #1e1e1e;
            --bg2: #252526;
            --bg3: #2d2d2d;
            --bg4: #3c3c3c;
            --accent: #0e639c;
            --accent2: #569cd6;
            --text: #d4d4d4;
            --text2: #808080;
            --green: #4ec9b0;
            --red: #f44747;
            --yellow: #dcdcaa;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 {
            color: var(--accent2);
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 24px;
        }
        .subtitle {
            color: var(--text2);
            font-size: 13px;
            margin-bottom: 20px;
        }
        .container {
            width: 100%;
            max-width: 700px;
        }
        .drop-zone {
            border: 2px dashed var(--bg4);
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--bg2);
            margin-bottom: 15px;
        }
        .drop-zone:hover, .drop-zone.drag-over {
            border-color: var(--accent2);
            background: var(--bg3);
        }
        .drop-zone-icon {
            font-size: 48px;
            margin-bottom: 10px;
            opacity: 0.5;
        }
        .drop-zone-text {
            color: var(--text2);
            font-size: 14px;
        }
        .drop-zone-text span {
            color: var(--accent2);
            text-decoration: underline;
            cursor: pointer;
        }
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .control-group label {
            color: var(--text2);
            font-size: 13px;
        }
        select, button {
            background: var(--bg3);
            color: var(--text);
            border: 1px solid var(--bg4);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            outline: none;
        }
        select:hover, button:hover {
            border-color: var(--accent2);
        }
        button.primary {
            background: var(--accent);
            border-color: var(--accent);
        }
        button.primary:hover {
            background: #1177bb;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .batch-progress {
            margin-bottom: 15px;
            display: none;
        }
        .batch-progress.active {
            display: block;
        }
        .batch-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text2);
            margin-bottom: 5px;
        }
        .progress-bar-bg {
            height: 6px;
            background: var(--bg4);
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: var(--accent2);
            border-radius: 3px;
            transition: width 0.3s;
            width: 0%;
        }
        .file-list {
            background: var(--bg2);
            border-radius: 8px;
            overflow: hidden;
            max-height: 400px;
            overflow-y: auto;
        }
        .file-list::-webkit-scrollbar {
            width: 8px;
        }
        .file-list::-webkit-scrollbar-track {
            background: var(--bg2);
        }
        .file-list::-webkit-scrollbar-thumb {
            background: var(--bg4);
            border-radius: 4px;
        }
        .file-item {
            padding: 12px 15px;
            border-bottom: 1px solid var(--bg3);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .file-item:last-child {
            border-bottom: none;
        }
        .file-icon {
            font-size: 20px;
            width: 30px;
            text-align: center;
            flex-shrink: 0;
        }
        .file-info {
            flex: 1;
            min-width: 0;
        }
        .file-name {
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }
        .file-progress {
            height: 3px;
            background: var(--bg4);
            border-radius: 2px;
            overflow: hidden;
        }
        .file-progress-fill {
            height: 100%;
            background: var(--accent2);
            border-radius: 2px;
            transition: width 0.3s;
            width: 0%;
        }
        .file-progress-fill.done {
            background: var(--green);
        }
        .file-progress-fill.error {
            background: var(--red);
        }
        .file-status {
            font-size: 11px;
            color: var(--text2);
            margin-top: 3px;
        }
        .file-status.done {
            color: var(--green);
        }
        .file-status.error {
            color: var(--red);
        }
        .file-size {
            font-size: 11px;
            color: var(--text2);
            flex-shrink: 0;
        }
        .empty-state {
            padding: 40px 20px;
            text-align: center;
            color: var(--text2);
            font-size: 13px;
        }
        .credits {
            margin-top: 20px;
            font-size: 12px;
            color: var(--text2);
            text-align: center;
        }
        .credits a {
            color: var(--accent2);
            text-decoration: none;
        }
        .credits a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>NCM Converter</h1>
        <p class="subtitle">NetEase Cloud Music .ncm to mp3/flac</p>

        <div class="drop-zone" id="dropZone">
            <div class="drop-zone-icon">🎵</div>
            <div class="drop-zone-text">
                Drag & drop .ncm files here<br>
                or <span id="browseBtn">browse files</span>
            </div>
        </div>
        <input type="file" id="fileInput" accept=".ncm" multiple hidden>

        <div class="controls">
            <div class="control-group">
                <label>Workers:</label>
                <select id="workerCount">
                    <option value="1">1</option>
                    <option value="2" selected>2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                </select>
            </div>
            <button class="primary" id="convertBtn" disabled>Convert</button>
            <button id="clearBtn" disabled>Clear</button>
        </div>

        <div class="batch-progress" id="batchProgress">
            <div class="batch-info">
                <span id="batchText">0 / 0</span>
                <span id="batchPercent">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="batchBar"></div>
            </div>
        </div>

        <div class="file-list" id="fileList">
            <div class="empty-state" id="emptyState">No files added</div>
        </div>

        <div class="credits">
            by <a href="https://github.com/Nanawwa" target="_blank">Nanawwa</a>
        </div>
    </div>

    <script>
    const CORE_KEY = new Uint8Array([0x68,0x7A,0x48,0x52,0x41,0x6D,0x73,0x6F,0x35,0x6B,0x49,0x6E,0x62,0x61,0x78,0x57]);
    const MOD_KEY = new Uint8Array([0x23,0x31,0x34,0x6C,0x6A,0x6B,0x5F,0x21,0x5C,0x5D,0x26,0x30,0x55,0x3C,0x27,0x28]);

    const SBOX = [
        0x63,0x7c,0x77,0x7b,0xf2,0x6b,0x6f,0xc5,0x30,0x01,0x67,0x2b,0xfe,0xd7,0xab,0x76,
        0xca,0x82,0xc9,0x7d,0xfa,0x59,0x47,0xf0,0xad,0xd4,0xa2,0xaf,0x9c,0xa4,0x72,0xc0,
        0xb7,0xfd,0x93,0x26,0x36,0x3f,0xf7,0xcc,0x34,0xa5,0xe5,0xf1,0x71,0xd8,0x31,0x15,
        0x04,0xc7,0x23,0xc3,0x18,0x96,0x05,0x9a,0x07,0x12,0x80,0xe2,0xeb,0x27,0xb2,0x75,
        0x09,0x83,0x2c,0x1a,0x1b,0x6e,0x5a,0xa0,0x52,0x3b,0xd6,0xb3,0x29,0xe3,0x2f,0x84,
        0x53,0xd1,0x00,0xed,0x20,0xfc,0xb1,0x5b,0x6a,0xcb,0xbe,0x39,0x4a,0x4c,0x58,0xcf,
        0xd0,0xef,0xaa,0xfb,0x43,0x4d,0x33,0x85,0x45,0xf9,0x02,0x7f,0x50,0x3c,0x9f,0xa8,
        0x51,0xa3,0x40,0x8f,0x92,0x9d,0x38,0xf5,0xbc,0xb6,0xda,0x21,0x10,0xff,0xf3,0xd2,
        0xcd,0x0c,0x13,0xec,0x5f,0x97,0x44,0x17,0xc4,0xa7,0x7e,0x3d,0x64,0x5d,0x19,0x73,
        0x60,0x81,0x4f,0xdc,0x22,0x2a,0x90,0x88,0x46,0xee,0xb8,0x14,0xde,0x5e,0x0b,0xdb,
        0xe0,0x32,0x3a,0x0a,0x49,0x06,0x24,0x5c,0xc2,0xd3,0xac,0x62,0x91,0x95,0xe4,0x79,
        0xe7,0xc8,0x37,0x6d,0x8d,0xd5,0x4e,0xa9,0x6c,0x56,0xf4,0xea,0x65,0x7a,0xae,0x08,
        0xba,0x78,0x25,0x2e,0x1c,0xa6,0xb4,0xc6,0xe8,0xdd,0x74,0x1f,0x4b,0xbd,0x8b,0x8a,
        0x70,0x3e,0xb5,0x66,0x48,0x03,0xf6,0x0e,0x61,0x35,0x57,0xb9,0x86,0xc1,0x1d,0x9e,
        0xe1,0xf8,0x98,0x11,0x69,0xd9,0x8e,0x94,0x9b,0x1e,0x87,0xe9,0xce,0x55,0x28,0xdf,
        0x8c,0xa1,0x89,0x0d,0xbf,0xe6,0x42,0x68,0x41,0x99,0x2d,0x0f,0xb0,0x54,0xbb,0x16
    ];

    const INV_SBOX = [
        0x52,0x09,0x6a,0xd5,0x30,0x36,0xa5,0x38,0xbf,0x40,0xa3,0x9e,0x81,0xf3,0xd7,0xfb,
        0x7c,0xe3,0x39,0x82,0x9b,0x2f,0xff,0x87,0x34,0x8e,0x43,0x44,0xc4,0xde,0xe9,0xcb,
        0x54,0x7b,0x94,0x32,0xa6,0xc2,0x23,0x3d,0xee,0x4c,0x95,0x0b,0x42,0xfa,0xc3,0x4e,
        0x08,0x2e,0xa1,0x66,0x28,0xd9,0x24,0xb2,0x76,0x5b,0xa2,0x49,0x6d,0x8b,0xd1,0x25,
        0x72,0xf8,0xf6,0x64,0x86,0x68,0x98,0x16,0xd4,0xa4,0x5c,0xcc,0x5d,0x65,0xb6,0x92,
        0x6c,0x70,0x48,0x50,0xfd,0xed,0xb9,0xda,0x5e,0x15,0x46,0x57,0xa7,0x8d,0x9d,0x84,
        0x90,0xd8,0xab,0x00,0x8c,0xbc,0xd3,0x0a,0xf7,0xe4,0x58,0x05,0xb8,0xb3,0x45,0x06,
        0xd0,0x2c,0x1e,0x8f,0xca,0x3f,0x0f,0x02,0xc1,0xaf,0xbd,0x03,0x01,0x13,0x8a,0x6b,
        0x3a,0x91,0x11,0x41,0x4f,0x67,0xdc,0xea,0x97,0xf2,0xcf,0xce,0xf0,0xb4,0xe6,0x73,
        0x96,0xac,0x74,0x22,0xe7,0xad,0x35,0x85,0xe2,0xf9,0x37,0xe8,0x1c,0x75,0xdf,0x6e,
        0x47,0xf1,0x1a,0x71,0x1d,0x29,0xc5,0x89,0x6f,0xb7,0x62,0x0e,0xaa,0x18,0xbe,0x1b,
        0xfc,0x56,0x3e,0x4b,0xc6,0xd2,0x79,0x20,0x9a,0xdb,0xc0,0xfe,0x78,0xcd,0x5a,0xf4,
        0x1f,0xdd,0xa8,0x33,0x88,0x07,0xc7,0x31,0xb1,0x12,0x10,0x59,0x27,0x80,0xec,0x5f,
        0x60,0x51,0x7f,0xa9,0x19,0xb5,0x4a,0x0d,0x2d,0xe5,0x7a,0x9f,0x93,0xc9,0x9c,0xef,
        0xa0,0xe0,0x3b,0x4d,0xae,0x2a,0xf5,0xb0,0xc8,0xeb,0xbb,0x3c,0x83,0x53,0x99,0x61,
        0x17,0x2b,0x04,0x7e,0xba,0x77,0xd6,0x26,0xe1,0x69,0x14,0x63,0x55,0x21,0x0c,0x7d
    ];

    const RCON = [0x01, 0x02, 0x04, 0x08, 0x10, 0x20, 0x40, 0x80, 0x1b, 0x36];

    function subBytes(state) {
        for (let i = 0; i < 16; i++) state[i] = SBOX[state[i]];
    }

    function invSubBytes(state) {
        for (let i = 0; i < 16; i++) state[i] = INV_SBOX[state[i]];
    }

    function shiftRows(state) {
        let temp = new Uint8Array(16);
        temp[0] = state[0]; temp[1] = state[5]; temp[2] = state[10]; temp[3] = state[15];
        temp[4] = state[4]; temp[5] = state[9]; temp[6] = state[14]; temp[7] = state[3];
        temp[8] = state[8]; temp[9] = state[13]; temp[10] = state[2]; temp[11] = state[7];
        temp[12] = state[12]; temp[13] = state[1]; temp[14] = state[6]; temp[15] = state[11];
        state.set(temp);
    }

    function invShiftRows(state) {
        let temp = new Uint8Array(16);
        temp[0] = state[0]; temp[1] = state[13]; temp[2] = state[10]; temp[3] = state[7];
        temp[4] = state[4]; temp[5] = state[1]; temp[6] = state[14]; temp[7] = state[11];
        temp[8] = state[8]; temp[9] = state[5]; temp[10] = state[2]; temp[11] = state[15];
        temp[12] = state[12]; temp[13] = state[9]; temp[14] = state[6]; temp[15] = state[3];
        state.set(temp);
    }

    function gmul(a, b) {
        let p = 0;
        for (let i = 0; i < 8; i++) {
            if (b & 1) p ^= a;
            let hi = a & 0x80;
            a = (a << 1) & 0xff;
            if (hi) a ^= 0x1b;
            b >>= 1;
        }
        return p;
    }

    function mixColumns(state) {
        for (let c = 0; c < 4; c++) {
            let i = c * 4;
            let a0 = state[i], a1 = state[i+1], a2 = state[i+2], a3 = state[i+3];
            state[i]   = gmul(a0, 2) ^ gmul(a1, 3) ^ a2 ^ a3;
            state[i+1] = a0 ^ gmul(a1, 2) ^ gmul(a2, 3) ^ a3;
            state[i+2] = a0 ^ a1 ^ gmul(a2, 2) ^ gmul(a3, 3);
            state[i+3] = gmul(a0, 3) ^ a1 ^ a2 ^ gmul(a3, 2);
        }
    }

    function invMixColumns(state) {
        for (let c = 0; c < 4; c++) {
            let i = c * 4;
            let a0 = state[i], a1 = state[i+1], a2 = state[i+2], a3 = state[i+3];
            state[i]   = gmul(a0, 0x0e) ^ gmul(a1, 0x0b) ^ gmul(a2, 0x0d) ^ gmul(a3, 0x09);
            state[i+1] = gmul(a0, 0x09) ^ gmul(a1, 0x0e) ^ gmul(a2, 0x0b) ^ gmul(a3, 0x0d);
            state[i+2] = gmul(a0, 0x0d) ^ gmul(a1, 0x09) ^ gmul(a2, 0x0e) ^ gmul(a3, 0x0b);
            state[i+3] = gmul(a0, 0x0b) ^ gmul(a1, 0x0d) ^ gmul(a2, 0x09) ^ gmul(a3, 0x0e);
        }
    }

    function addRoundKey(state, roundKey) {
        for (let i = 0; i < 16; i++) state[i] ^= roundKey[i];
    }

    function keyExpansion(key) {
        let w = new Uint8Array(176);
        for (let i = 0; i < 16; i++) w[i] = key[i];
        for (let i = 4; i < 44; i++) {
            let temp = new Uint8Array(4);
            temp[0] = w[(i-1)*4]; temp[1] = w[(i-1)*4+1]; temp[2] = w[(i-1)*4+2]; temp[3] = w[(i-1)*4+3];
            if (i % 4 === 0) {
                let t = temp[0];
                temp[0] = SBOX[temp[1]] ^ RCON[(i/4)-1];
                temp[1] = SBOX[temp[2]];
                temp[2] = SBOX[temp[3]];
                temp[3] = SBOX[t];
            }
            for (let j = 0; j < 4; j++) w[i*4+j] = w[(i-4)*4+j] ^ temp[j];
        }
        return w;
    }

    function aesDecryptBlock(block, expandedKey) {
        let state = new Uint8Array(16);
        for (let i = 0; i < 16; i++) state[i] = block[i];
        
        addRoundKey(state, expandedKey.slice(160, 176));
        
        for (let r = 9; r >= 1; r--) {
            invShiftRows(state);
            invSubBytes(state);
            addRoundKey(state, expandedKey.slice(r*16, (r+1)*16));
            invMixColumns(state);
        }
        
        invShiftRows(state);
        invSubBytes(state);
        addRoundKey(state, expandedKey.slice(0, 16));
        
        return state;
    }

    function pkcs7Unpad(data) {
        let padLen = data[data.length - 1];
        if (padLen < 1 || padLen > 16) return data;
        for (let i = data.length - padLen; i < data.length; i++) {
            if (data[i] !== padLen) return data;
        }
        return data.slice(0, data.length - padLen);
    }

    function aesEcbDecrypt(ciphertext, key) {
        let expandedKey = keyExpansion(key);
        let output = new Uint8Array(ciphertext.length);
        for (let i = 0; i < ciphertext.length; i += 16) {
            let block = ciphertext.slice(i, i + 16);
            let decryptedBlock = aesDecryptBlock(block, expandedKey);
            output.set(decryptedBlock, i);
        }
        return pkcs7Unpad(output);
    }

    function buildKeyBox(key) {
        const kb = new Uint8Array(256);
        for (let i = 0; i < 256; i++) kb[i] = i;
        let lastByte = 0, keyOffset = 0;
        for (let i = 0; i < 256; i++) {
            const swap = kb[i];
            const c = (swap + lastByte + key[keyOffset++]) & 0xff;
            if (keyOffset >= key.length) keyOffset = 0;
            kb[i] = kb[c]; kb[c] = swap; lastByte = c;
        }
        return kb;
    }

    function arrayBufferToBase64(buf) {
        let bytes = new Uint8Array(buf);
        let binary = '';
        for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
        return btoa(binary);
    }

    function base64ToArrayBuffer(b64) {
        const bin = atob(b64);
        const buf = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
        return buf;
    }

    async function decryptNCM(data, onProgress) {
        const view = new DataView(data.buffer, data.byteOffset, data.byteLength);
        if (view.getUint32(0, true) !== 0x4e455443 || view.getUint32(4, true) !== 0x4d414446) {
            throw new Error('Not a valid NCM file');
        }

        let offset = 10;
        const keyDataLen = view.getUint32(offset, true);
        offset += 4;
        const keyData = new Uint8Array(data.buffer, data.byteOffset + offset, keyDataLen);
        for (let i = 0; i < keyDataLen; i++) keyData[i] ^= 0x64;

        const decryptedKeyData = aesEcbDecrypt(keyData, CORE_KEY);
        const musicKeyRaw = decryptedKeyData.slice(17);

        onProgress(30);

        offset += keyDataLen;
        const metaLen = view.getUint32(offset, true);
        offset += 4;
        let metadata = null;

        if (metaLen > 0) {
            const metaEnc = new Uint8Array(data.buffer, data.byteOffset + offset, metaLen);
            offset += metaLen;
            for (let i = 0; i < metaEnc.length; i++) metaEnc[i] ^= 0x63;
            const metaBase64 = arrayBufferToBase64(metaEnc.slice(22));
            const metaDec = aesEcbDecrypt(base64ToArrayBuffer(metaBase64), MOD_KEY);
            const metaFinal = metaDec.slice(6);
            metadata = JSON.parse(new TextDecoder().decode(metaFinal));
        }

        onProgress(40);

        offset += 5;

        const coverFrameLen = view.getUint32(offset, true);
        offset += 4;
        const imgLen = view.getUint32(offset, true);
        offset += 4;
        let imgData = null;
        if (imgLen > 0) {
            imgData = new Uint8Array(data.buffer, data.byteOffset + offset, imgLen);
            offset += imgLen;
        } else {
            offset += coverFrameLen - 4;
        }

        onProgress(60);

        const keyBox = buildKeyBox(musicKeyRaw);
        const audioData = data.slice(offset);

        onProgress(70);

        const result = new Uint8Array(audioData.length);
        const CHUNK_SIZE = 0x8000;
        for (let i = 0; i < audioData.length; i += CHUNK_SIZE) {
            const end = Math.min(i + CHUNK_SIZE, audioData.length);
            for (let j = i; j < end; j++) {
                const k = (j + 1) & 0xff;
                result[j] = audioData[j] ^ keyBox[(keyBox[k] + keyBox[(keyBox[k] + k) & 0xff]) & 0xff];
            }
            onProgress(70 + Math.round((i / audioData.length) * 20));
        }

        let format = 'bin';
        if (result.length > 3) {
            if (result[0] === 0x49 && result[1] === 0x44 && result[2] === 0x33) format = 'mp3';
            else if (result[0] === 0x66 && result[1] === 0x4C && result[2] === 0x61 && result[3] === 0x43) format = 'flac';
        }

        let filename;
        if (metadata && metadata.musicName) {
            const artists = (metadata.artist || []).map(a => a[0]).join(', ');
            filename = metadata.musicName + (artists ? ' - ' + artists : '') + '.' + format;
        } else {
            filename = 'output.' + format;
        }

        onProgress(100);
        return { data: result, filename };
    }

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const browseBtn = document.getElementById('browseBtn');
    const convertBtn = document.getElementById('convertBtn');
    const clearBtn = document.getElementById('clearBtn');
    const fileList = document.getElementById('fileList');
    const emptyState = document.getElementById('emptyState');
    const batchProgress = document.getElementById('batchProgress');
    const batchText = document.getElementById('batchText');
    const batchPercent = document.getElementById('batchPercent');
    const batchBar = document.getElementById('batchBar');
    const workerCountSelect = document.getElementById('workerCount');

    let files = [];
    let processing = false;

    browseBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => addFiles(e.target.files));
    dropZone.addEventListener('click', (e) => { if (e.target === dropZone || e.target.classList.contains('drop-zone-icon') || e.target.classList.contains('drop-zone-text')) fileInput.click(); });

    ['dragenter', 'dragover'].forEach(evt => {
        dropZone.addEventListener(evt, (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    });
    ['dragleave', 'drop'].forEach(evt => {
        dropZone.addEventListener(evt, (e) => { e.preventDefault(); dropZone.classList.remove('drag-over'); });
    });
    dropZone.addEventListener('drop', (e) => { addFiles(e.dataTransfer.files); });

    function addFiles(fileListInput) {
        for (const f of fileListInput) {
            if (f.name.toLowerCase().endsWith('.ncm') && !files.find(x => x.name === f.name && x.size === f.size)) {
                files.push(f);
            }
        }
        fileInput.value = '';
        renderFiles();
    }

    function renderFiles() {
        fileList.innerHTML = '';
        if (files.length === 0) {
            fileList.innerHTML = '<div class="empty-state">No files added</div>';
            convertBtn.disabled = true;
            clearBtn.disabled = true;
            batchProgress.classList.remove('active');
            return;
        }
        convertBtn.disabled = processing;
        clearBtn.disabled = processing;
        files.forEach((f, i) => {
            const item = document.createElement('div');
            item.className = 'file-item';
            item.id = 'file-' + i;
            item.innerHTML = `
                <div class="file-icon">🎵</div>
                <div class="file-info">
                    <div class="file-name">${escHtml(f.name)}</div>
                    <div class="file-progress"><div class="file-progress-fill" id="bar-${i}"></div></div>
                    <div class="file-status" id="status-${i}">Waiting</div>
                </div>
                <div class="file-size">${formatSize(f.size)}</div>
            `;
            fileList.appendChild(item);
        });
    }

    function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function formatSize(b) { if (b < 1024) return b + ' B'; if (b < 1048576) return (b/1024).toFixed(1) + ' KB'; return (b/1048576).toFixed(1) + ' MB'; }

    clearBtn.addEventListener('click', () => { files = []; renderFiles(); });
    convertBtn.addEventListener('click', startConvert);

    async function startConvert() {
        if (processing || files.length === 0) return;
        processing = true;
        convertBtn.disabled = true;
        clearBtn.disabled = true;
        batchProgress.classList.add('active');

        const workers = parseInt(workerCountSelect.value);
        const total = files.length;
        let done = 0;

        function updateBatch() {
            batchText.textContent = `${done} / ${total}`;
            batchPercent.textContent = Math.round(done / total * 100) + '%';
            batchBar.style.width = (done / total * 100) + '%';
        }
        updateBatch();

        const queue = [...files.keys()];
        async function worker() {
            while (queue.length > 0) {
                const idx = queue.shift();
                try {
                    setFileStatus(idx, 'Processing...', 10);
                    const buf = await files[idx].arrayBuffer();
                    const result = await decryptNCM(new Uint8Array(buf), (pct) => setFileStatus(idx, 'Decrypting... ' + pct + '%', pct));
                    setFileStatus(idx, 'Done', 100, true);
                    downloadFile(result.data, result.filename);
                } catch (e) {
                    setFileStatus(idx, 'Error: ' + e.message, 0, false, true);
                }
                done++;
                updateBatch();
            }
        }

        const ps = [];
        for (let i = 0; i < workers; i++) ps.push(worker());
        await Promise.all(ps);

        processing = false;
        convertBtn.disabled = false;
        clearBtn.disabled = false;
    }

    function setFileStatus(idx, text, pct, done, error) {
        const bar = document.getElementById('bar-' + idx);
        const status = document.getElementById('status-' + idx);
        if (bar) { bar.style.width = pct + '%'; if (done) bar.classList.add('done'); if (error) bar.classList.add('error'); }
        if (status) { status.textContent = text; if (done) status.classList.add('done'); if (error) status.classList.add('error'); }
    }

    function downloadFile(data, name) {
        const blob = new Blob([data]);
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = name;
        document.body.appendChild(a); a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }
    </script>
</body>
