appId: com.ncm.converter
productName: NCM转换器
directories:
  output: release
files:
  - dist/**/*
win:
  target:
    - nsis
    - portable
  icon: assets/icon.ico
linux:
  target:
    - AppImage
    - deb
  icon: assets/icon.png
mac:
  target:
    - dmg
  icon: assets/icon.icns
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
